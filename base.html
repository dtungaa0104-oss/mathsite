<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Математикийн Портал{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<div class="noise-overlay"></div>

<header class="site-header">
  <nav class="nav-container">
    <a href="/" class="nav-logo">
      <span class="logo-symbol">∑</span>
      <span class="logo-text">МатемПортал</span>
    </a>
    <button class="nav-toggle" id="navToggle">&#9776;</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/tools" class="nav-link {% if request.path == '/tools' %}active{% endif %}">
        <span class="nav-icon">⚙</span> Хэрэгслүүд
      </a></li>
      <li><a href="/engagement" class="nav-link {% if request.path == '/engagement' %}active{% endif %}">
        <span class="nav-icon">🎮</span> Тоглоомжуулах
      </a></li>
      <li><a href="/learning" class="nav-link {% if request.path == '/learning' %}active{% endif %}">
        <span class="nav-icon">📚</span> Суралцах
      </a></li>
      <li><a href="/apps" class="nav-link {% if request.path == '/apps' %}active{% endif %}">
        <span class="nav-icon">📱</span> Аппликейшн
      </a></li>
      <li><a href="/local" class="nav-link {% if request.path == '/local' %}active{% endif %}">
        <span class="nav-icon">🇲🇳</span> Монгол
      </a></li>
    </ul>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="logo-symbol">∑</span>
      <p>Математикийн мэдлэгийг хэн бүхэнд хүргэх нь бидний зорилго.</p>
    </div>
    <div class="footer-links">
      <a href="/tools">Хэрэгслүүд</a>
      <a href="/engagement">Тоглоомжуулах</a>
      <a href="/learning">Суралцах</a>
      <a href="/apps">Апп</a>
      <a href="/local">Монгол</a>
    </div>
    <p class="footer-copy">© 2025 МатемПортал</p>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
